<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#007AFF" />
    <title>megustastu-bookings</title>
    <!-- v14.2.0: Dark-mode theming tokens. Light values live in :root; dark
         values override under [data-theme="dark"]. A theme flip = one
         data-theme attribute change (see src/hooks/useThemeMode.js) — no React
         re-render. Every JS colour that participates references a var(--…),
         migrated token-by-token in waves: v14.2.0 the core `S` set, v14.2.1 the
         data-token colour sets (STATUS_COLORS / BLOCK_BG / TBL / BTN) — all in
         src/lib/constants.js; atoms.jsx + components follow. Rule: add a token
         -> define it in BOTH blocks. Colours used at varying opacity (status /
         table chips) are RGB-channel triplets composed rgba(var(--…-rgb), a). -->
    <style>
      :root {
        /* App background (6-stop glass gradient) */
        --bg-app: linear-gradient(135deg, #e8edf5 0%, #dfe6f0 20%, #e2e0ef 40%, #dce8f0 60%, #e5eaf2 80%, #e0e4ee 100%);
        /* Core surfaces */
        --bg-card: rgba(255, 255, 255, 0.45);
        --border-card: rgba(255, 255, 255, 0.35);
        /* Text */
        --text-primary: #1a1d24;
        --text-muted: #5a6474;
        /* Accent */
        --accent: #007aff;
        /* Status chips — bg + border share a hue (RGB triplet, composed in
           constants.js as rgba(var(--…-rgb), a)); text is a solid token. */
        --status-confirmed-rgb: 250, 204, 21;  --status-confirmed-text: #92400e;
        --status-seated-rgb: 34, 197, 94;      --status-seated-text: #166534;
        --status-completed-rgb: 148, 163, 184; --status-completed-text: #64748b;
        --status-cancelled-rgb: 239, 68, 68;   --status-cancelled-text: #991b1b;
        /* Timeline block fills / status buttons — saturated, white text;
           theme-invariant (read on light + dark), defined once here. */
        --block-confirmed: rgba(180, 130, 40, 0.85);
        --block-seated: rgba(34, 160, 80, 0.85);
        --block-completed: rgba(140, 140, 150, 0.7);
        --block-cancelled: rgba(200, 80, 80, 0.8);
        /* Table badges — bg .8 / border .5 share a hue (triplet); white text. */
        --tbl-out-rgb: 0, 122, 255;
        --tbl-ind-rgb: 175, 82, 222;
        --text-on-accent: #ffffff;
        /* Buttons — saturated accent fills, white text; theme-invariant. */
        --btn-tables: rgba(0, 122, 255, 0.75);
        --btn-edit: rgba(0, 122, 255, 0.7);
        --btn-del: rgba(220, 60, 60, 0.75);
        --btn-cancel: rgba(220, 60, 60, 0.75);
        --btn-clear: rgba(220, 60, 60, 0.7);
        --btn-reset: rgba(220, 60, 60, 0.7);
        --btn-today: rgba(0, 122, 255, 0.7);
        --btn-nav: rgba(120, 130, 150, 0.5);
        --btn-dismiss: rgba(220, 60, 60, 0.7);
        --btn-orange: rgba(230, 100, 30, 0.8);
        /* ── v14.2.2: atoms / modal surfaces, borders, semantic text, banners ── */
        /* Surfaces */
        --bg-sheet: rgba(255, 255, 255, 0.72);         /* Overlay desktop dialog card */
        --bg-sheet-mobile: rgba(240, 243, 248, 0.98);  /* Overlay mobile full-screen sheet */
        --bg-soft: rgba(248, 250, 253, 0.95);          /* Section panel */
        --bg-input: rgba(255, 255, 255, 0.5);          /* text inputs / selects */
        --bg-kbd: rgba(255, 255, 255, 0.75);           /* keycap */
        --btn-default: rgba(120, 130, 150, 0.55);      /* mkBtn default grey fill */
        --bg-stepper: rgba(235, 239, 246, 0.95);       /* +/- stepper buttons (form) */
        --bg-tabbar: rgba(240, 243, 248, 0.8);         /* Settings tab-strip track */
        --bg-tab-active: rgba(255, 255, 255, 0.95);    /* lifted active tab */
        /* Borders */
        --border-sheet: rgba(255, 255, 255, 0.5);
        --border-soft: rgba(210, 218, 230, 0.8);
        --border-input: rgba(255, 255, 255, 0.4);
        --border-kbd: rgba(180, 190, 210, 0.55);
        --border-glass: rgba(255, 255, 255, 0.3);      /* white rim on filled btns / Toggle */
        /* Scrim + toggle */
        --scrim: rgba(0, 0, 0, 0.25);                  /* modal backdrop */
        --toggle-on: rgba(0, 122, 255, 0.7);
        --toggle-off: rgba(180, 180, 190, 0.4);
        /* Semantic text (on the sheet, or on the matching banner below) */
        --text-secondary: #4a5568;
        --text-faint: #8a94a3;
        --text-required: #dc2626;
        --warn-text: #9a3412;
        --danger-text: #991b1b;
        --success-text: #166534;
        /* Banners (warn / danger / suggestion) — bg + border + text flip together */
        --warn-bg: rgba(255, 237, 213, 0.7);    --warn-border: rgba(253, 186, 116, 0.55);
        --danger-bg: rgba(254, 226, 226, 0.7);  --danger-border: rgba(252, 165, 165, 0.55);
        --suggest-bg: rgba(220, 252, 231, 0.8); --suggest-border: rgba(134, 239, 172, 0.5);
        /* Shadows carrying white inset highlights (dimmed on dark) */
        --shadow-sheet: 0 8px 40px rgba(0, 0, 0, 0.12), inset 0 1px 1px rgba(255, 255, 255, 0.8);
        --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.06), inset 0 1px 1px rgba(255, 255, 255, 0.6);
        --shadow-input: inset 0 1px 2px rgba(255, 255, 255, 0.6), 0 1px 3px rgba(0, 0, 0, 0.06);
        --shadow-btn: 0 1px 4px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 0.25);
        /* ── v14.2.3: TimelineView (Gantt canvas) ── */
        --tl-card-bg: rgba(255, 255, 255, 0.4);        /* the timeline container glass card */
        --tl-card-border: rgba(255, 255, 255, 0.45);
        --tl-gridline-hour: rgba(120, 130, 155, 0.45);  /* hour ticks (heavier) */
        --tl-gridline-quarter: rgba(140, 150, 175, 0.3);/* quarter-hour ticks */
        --tl-row-border: rgba(180, 190, 210, 0.2);      /* between table rows */
        --tl-header-border: rgba(180, 190, 210, 0.3);   /* under the time-axis strip */
        --tl-header-strip: rgba(220, 225, 235, 0.45);   /* the label-col + axis header bg */
        --tl-hour-pill: rgba(90, 100, 120, 0.9);        /* time labels (white text) */
        --tl-now-pill: rgba(0, 0, 0, 0.9);              /* now-time label */
        --tl-now-line: rgba(0, 0, 0, 0.6);              /* the vertical now line */
        --tl-unassigned-border: rgba(220, 60, 60, 0.4); /* dashed unassigned divider */
        --tl-block-warn: #dc2626;                        /* booking overdue border */
        --tl-block-warn-soon: #f59e0b;                   /* booking due-soon border */
        --tl-blocked-a: #991b1b;                          /* table-block stripe colours */
        --tl-blocked-b: #7f1d1d;
        --tl-blocked-badge: rgba(153, 27, 27, 0.85);     /* "blocked" label-col badge bg */
        --tl-blocked-badge-border: rgba(153, 27, 27, 0.5);
        --tl-popup-bg: #eef1f7;                           /* quick-status popup card */
        --tl-popup-scrim: rgba(0, 0, 0, 0.18);
        --cog-bg: rgba(120, 130, 150, 0.4);              /* settings cog button */
        --cog-border: rgba(255, 255, 255, 0.45);
        /* ── v14.2.4: ListView cards ── */
        --bg-card-strong: rgba(255, 255, 255, 0.45);     /* default booking card */
        --bg-card-dim: rgba(255, 255, 255, 0.35);        /* seated/completed/cancelled card */
        --border-card-plain: rgba(255, 255, 255, 0.4);   /* plain card border */
        --card-warn-border: rgba(245, 158, 11, 0.5);     /* due-soon card edge */
        --card-overdue-border: rgba(220, 60, 60, 0.5);   /* overdue card edge */
        --card-conflict-border: rgba(252, 165, 165, 0.5);/* no-table-assigned card edge */
        --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.06), inset 0 1px 1px rgba(255, 255, 255, 0.5);
      }
      [data-theme="dark"] {
        --bg-app: linear-gradient(135deg, #15171c 0%, #191c22 20%, #1c1a23 40%, #161c26 60%, #1b1f28 80%, #17191f 100%);
        --bg-card: rgba(44, 44, 46, 0.55);
        --border-card: rgba(255, 255, 255, 0.10);
        --text-primary: #f2f2f7;
        --text-muted: #9a9aa0;
        --accent: #0a84ff;
        /* Status chip text -> light variants for dark surfaces. Tint RGB and
           the block/table/button tokens are theme-invariant (inherited from
           :root); only the chip text needs to flip. */
        --status-confirmed-text: #fcd34d;
        --status-seated-text: #86efac;
        --status-completed-text: #cbd5e1;
        --status-cancelled-text: #fca5a5;
        /* ── v14.2.2: atoms / modal dark overrides ── */
        --bg-sheet: rgba(44, 44, 46, 0.85);
        --bg-sheet-mobile: rgba(28, 28, 30, 0.98);
        --bg-soft: rgba(255, 255, 255, 0.05);
        --bg-input: rgba(118, 118, 128, 0.24);
        --bg-kbd: rgba(255, 255, 255, 0.1);
        --btn-default: rgba(110, 118, 135, 0.5);
        --bg-stepper: rgba(255, 255, 255, 0.1);
        --bg-tabbar: rgba(0, 0, 0, 0.2);
        --bg-tab-active: rgba(255, 255, 255, 0.14);
        /* ── v14.2.3: TimelineView dark overrides ── */
        --tl-card-bg: rgba(44, 44, 46, 0.45);
        --tl-card-border: rgba(255, 255, 255, 0.1);
        --tl-gridline-hour: rgba(160, 170, 195, 0.22);
        --tl-gridline-quarter: rgba(150, 160, 185, 0.12);
        --tl-row-border: rgba(255, 255, 255, 0.07);
        --tl-header-border: rgba(255, 255, 255, 0.1);
        --tl-header-strip: rgba(255, 255, 255, 0.06);
        --tl-hour-pill: rgba(90, 100, 120, 0.85);
        --tl-now-pill: rgba(10, 132, 255, 0.95);
        --tl-now-line: rgba(10, 132, 255, 0.85);
        --tl-unassigned-border: rgba(255, 120, 120, 0.45);
        /* block warn borders, blocked-stripe + badge, popup are theme-invariant
           (saturated, white text — read on both); only scrim/card/bg flip */
        --tl-popup-bg: rgba(44, 44, 46, 0.95);
        --tl-popup-scrim: rgba(0, 0, 0, 0.45);
        --cog-bg: rgba(255, 255, 255, 0.1);
        --cog-border: rgba(255, 255, 255, 0.14);
        /* ── v14.2.4: ListView cards (dark) ── */
        --bg-card-strong: rgba(255, 255, 255, 0.06);
        --bg-card-dim: rgba(255, 255, 255, 0.04);
        --border-card-plain: rgba(255, 255, 255, 0.1);
        /* warn/overdue/conflict card edges read on both themes — kept from :root */
        --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        --border-sheet: rgba(255, 255, 255, 0.12);
        --border-soft: rgba(255, 255, 255, 0.1);
        --border-input: rgba(255, 255, 255, 0.12);
        --border-kbd: rgba(255, 255, 255, 0.15);
        --border-glass: rgba(255, 255, 255, 0.14);
        --scrim: rgba(0, 0, 0, 0.5);
        --toggle-on: rgba(10, 132, 255, 0.85);
        --toggle-off: rgba(120, 120, 128, 0.5);
        --text-secondary: #c7c7cc;
        --text-faint: #8a8a8e;
        --text-required: #ff6b6b;
        --warn-text: #fdba74;
        --danger-text: #fca5a5;
        --success-text: #86efac;
        --warn-bg: rgba(120, 70, 20, 0.3);    --warn-border: rgba(253, 186, 116, 0.4);
        --danger-bg: rgba(120, 30, 30, 0.32); --danger-border: rgba(252, 165, 165, 0.4);
        --suggest-bg: rgba(34, 90, 50, 0.45); --suggest-border: rgba(134, 239, 172, 0.35);
        --shadow-sheet: 0 8px 40px rgba(0, 0, 0, 0.55), inset 0 1px 1px rgba(255, 255, 255, 0.07);
        --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        --shadow-input: inset 0 1px 2px rgba(255, 255, 255, 0.05), 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow-btn: 0 1px 4px rgba(0, 0, 0, 0.35), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      }
      html, body { margin: 0; }
      body {
        background: var(--bg-app);
        min-height: 100dvh;
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <!-- v14.2.0: No-flash theme paint. Runs BEFORE React mounts so a dark-OS
         (or dark-saved) user never sees a light flash. Reads the per-device
         preference in localStorage["mgt-theme"] ("dark"|"light"), else falls
         back to the OS. MUST stay in sync with readThemePref() in src/App.jsx
         (same key, same value convention). -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("mgt-theme");
          var dark = saved === "dark"
            || (saved !== "light"
                && window.matchMedia
                && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) { /* keep default data-theme="light" */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
