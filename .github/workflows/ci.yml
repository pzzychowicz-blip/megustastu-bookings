name: CI

# Runs on every PR and on pushes to main. Gates on a clean production build, a
# green test suite (tests/*.test.js), AND a 0-error lint (the ~68-error backlog
# was cleared 2026-07-24: real fixes for unused vars / empty catches /
# conditional hooks, plus the react-hooks v6 React-Compiler advisories
# downgraded to warnings in eslint.config.js — they flag the app's documented
# live-binding/ref-mirror architecture). Warnings do not block.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build (production)
        run: npm run build
      - name: Test
        run: npm test
      - name: Lint (hard gate since the 2026-07-24 cleanup)
        run: npm run lint
